services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: rog
      POSTGRES_PASSWORD: rog
      POSTGRES_DB: rog
    ports:
      - "5432:5432"
    volumes:
      - rog_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - rog_redis_data:/data

volumes:
  rog_postgres_data:
  rog_redis_data:
